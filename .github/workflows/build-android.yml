name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Bundle JS and copy fonts into APK
        run: |
          # 1) Use expo export to create the JS bundle (resolves @/ aliases correctly)
          mkdir -p android/app/src/main/assets
          npx expo export --platform android 2>&1 | tail -5

          # 2) Copy the Hermes bytecode bundle
          cp dist/bundles/android-*.hbc android/app/src/main/assets/index.android.bundle
          echo "✅ JS bundle copied"

          # 3) Copy vector icon fonts to native assets (Ionicons, etc.)
          FONT_DIR="node_modules/@expo/vector-icons/build/vendor/react-native-vector-icons/Fonts"
          if [ -d "$FONT_DIR" ]; then
            cp "$FONT_DIR"/*.ttf android/app/src/main/assets/
            echo "✅ Vector icon fonts copied:"
            ls android/app/src/main/assets/*.ttf 2>/dev/null | head -5
          fi

          # 4) Also check expo prebuild fonts
          if [ -d "android/app/src/main/assets/fonts" ]; then
            echo "✅ Prebuild fonts already present"
          fi

          echo "📦 Final assets directory:"
          ls -la android/app/src/main/assets/

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: boaventura-estoque-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
