name: Build Android APK

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Generate native Android project
        run: npx expo prebuild --platform android --clean

      - name: Enable JS bundling in debug build
        run: |
          # React Native debug builds don't bundle JS by default (they expect a Metro dev server).
          # We need to force bundling so the APK is self-contained and works on real devices.
          sed -i 's/react {/react {\n        bundleInDebug = true/' android/app/build.gradle
          echo "--- Patched build.gradle (react block) ---"
          grep -A 5 "react {" android/app/build.gradle | head -10

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: boaventura-estoque-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90
